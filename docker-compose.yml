services:
  postgres:
    image: postgres:16-alpine
    container_name: padel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-padel}
      POSTGRES_USER: ${POSTGRES_USER:-padel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-padel_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - padel-postgres-data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  padel-postgres-data:
